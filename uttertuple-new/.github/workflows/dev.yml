name: Build and Deploy - Uttertuple DEV

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  fetch_latest_changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Fetch latest changes on VM
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_PATH_DEV: ${{ secrets.REPO_PATH_DEV }}
        with:
          host: ${{ secrets.HOST_DEV }}
          username: ${{ secrets.USERNAME_DEV }}
          key: ${{ secrets.SSH_KEY_DEV }}
          script: |
            echo "📥 Fetching latest changes on branch main..."
            cd ${{ secrets.REPO_PATH_DEV }}
            ./deploy.sh fetch_latest_changes main

  build_deploy:
    runs-on: ubuntu-latest
    needs: fetch_latest_changes
    if: github.event_name == 'push'
    steps:
      - name: Build and Deploy containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_PATH_DEV: ${{ secrets.REPO_PATH_DEV }}
        with:
          host: ${{ secrets.HOST_DEV }}
          username: ${{ secrets.USERNAME_DEV }}
          key: ${{ secrets.SSH_KEY_DEV }}
          script: |
            echo "🔧 Building and deploying containers..."
            cd ${{ secrets.REPO_PATH_DEV }}
            ./deploy.sh deploy_ci main

  health_checks:
    runs-on: ubuntu-latest
    needs: build_deploy
    if: github.event_name == 'push'
    steps:
      - name: Run Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_DEV }}
          username: ${{ secrets.USERNAME_DEV }}
          key: ${{ secrets.SSH_KEY_DEV }}
          script: |
            echo "🔍 Running backend health check..."
            sleep 15

            MAX_ATTEMPTS=5
            ATTEMPT=1
            SUCCESS=false

            while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
              echo "🧪 Attempt $ATTEMPT of $MAX_ATTEMPTS..."
              STATUS_CODE=$(curl -s -m 10 -o /dev/null -w "%{http_code}" http://localhost:8020/health)

              if [ "$STATUS_CODE" = "200" ]; then
                echo "✅ Health check passed (HTTP $STATUS_CODE)"
                SUCCESS=true
                break
              else
                echo "⚠️ Health check failed (HTTP $STATUS_CODE). Retrying..."
                sleep 5
                ATTEMPT=$((ATTEMPT + 1))
              fi
            done

            if [ "$SUCCESS" = false ]; then
              echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "🎉 Deployment and health check completed successfully"